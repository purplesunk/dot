monitor=HDMI-A-1,1920x1080,0x0,1
#monitor=HDMI-A-1,1440x1080,0x0,1

# Declare Applications
$terminal = uwsm-app -- foot
$fileManager = uwsm-app -- pcmanfm
$sound = uwsm-app -- pavucontrol
$menu = fuzzel --launch-prefix="uwsm app -- " $taskmanager = $terminal btop
$browser = uwsm-app -- /home/fmb/.local/share/AppImage/Helium.AppImage --enable-features=UseOzonePlatform --ozone-platform=wayland
$whatsapp = $browser --app="https://web.whatsapp.com"
$proton = $browser --app="https://mail.proton.me"
$tuta = $browser --app="https://app.tuta.com"
$simplelogin = $browser --app="https://app.simplelogin.io/"

source = ~/.config/hypr/keybinds.conf
#source = ~/.config/hypr/themes/frappe.conf

ecosystem {
	no_update_news = true
}

debug {
    disable_logs = false
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
	#col.active_border = rgba(8aadf4ee)
	col.inactive_border = rgba(595959aa)
	col.active_border = rgba(ffffffaa)
	# col.inactive_border = rgba(000000ff)

    allow_tearing = false
	resize_on_border = true

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 2

    shadow {
        enabled = false
		range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
		size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = no
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 1.94, quick
    animation = workspacesIn, 0, 1.21, quick
    animation = workspacesOut, 0, 1.94, quick
    animation = zoomFactor, 1, 7, quick
}

dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}

misc {
	force_default_wallpaper = 0
	disable_hyprland_logo = true
	font_family = Overpass Nerd Font
}

input {
	kb_layout = latam, us
	kb_options = caps:escape
	follow_mouse = 1
	touchpad {
		natural_scroll = true
	}
	sensitivity = 0
	accel_profile = flat

	repeat_rate = 38
	repeat_delay = 280
}

cursor {
    hide_on_key_press = true
	inactive_timeout = 2
}

windowrule = match:float true, rounding 10

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

windowrule {
	name = center-pop-up-size

	match:class = org.pulseaudio.pavucontrol

	size = 860 550
}

windowrule {
	name = center-pop-up-size-files

	match:class = pcmanfm
	match:title = Copying Files
	match:title = Deleting Files

	size = 860 550
}

windowrule {
	name = floating

	match:class = xdg-desktop-portal-gtk
	match:class = nwg-look
	match:class = qt5ct
	match:class = qt6ct
	match:title = *Preferences*

	float = true
}

windowrule {
	name = scrcpy

	match:class = scrcpy

	float = true
	pseudo = true
	keep_aspect_ratio = true
	size = 480 960
}

layerrule {
	name = looking-good

	match:namespace = waybar
	match:namespace = launcher
	match:namespace = notifications

	blur = true
	blur_popups = true
	ignore_alpha = 0.2
}

layerrule = animation slide, match:namespace = launcher

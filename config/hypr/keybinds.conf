###############
# KEYBINDINGS #
###############
bind = SUPER, W, killactive,
bind = SUPER, Return, exec, $terminal
bind = SUPER SHIFT, F, exec, $fileManager
bind = SUPER, E, exec, $menu
bind = SUPER, B, exec, $browser
bind = SUPER, T, exec, $taskmanager
bind = SUPER, A, exec, /home/fmb/repos/github.com/purplesunk/dot/scripts/tooglesink
bind = SUPER SHIFT, A, exec, $sound

# Activate no gaps
bind = SUPER, G, exec, ~/.config/hypr/scripts/nogaps.sh

# Open Apps with Combos
bind = SUPER, O, submap, open
submap = open
bind = , T, exec, $tuta
bind = , P, exec, $proton
bind = , W, exec, $whatsapp
bind = , S, exec, $simplelogin
bind = , catchall, submap, reset
submap = reset

# Hide waybar
bind = SUPER, space, exec, pkill -SIGUSR1 waybar
# bind = SUPER CTRL SHIFT, Z, exec, systemctl --user restart waybar

# Window States
bind = , F11, fullscreen,
bind = SUPER, F, fullscreen,
bind = SUPER SHIFT, M, exec, hyprctl dispatch fullscreenstate 0 2
bind = SUPER SHIFT, N, exec, hyptctl dispatch fullscreenstate 0 0
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, V, togglefloating,
# bind = SUPER, S, toggleswallow,
bind = SUPER, TAB, cyclenext, prev
bind = SUPER CTRL, J, togglesplit, # dwindle

# End active session
bind = SUPER, ESCAPE, exec, hyprlock
bind = SUPER ALT, ESCAPE, exec, uwsm stop
bind = SUPER CTRL, ESCAPE, exec, systemctl reboot
bind = SUPER SHIFT CTRL, ESCAPE, exec, systemctl poweroff

# Move focus with mainMod
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Move window 
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Resize window
binde = SUPER ALT, H, resizeactive, -100   0
binde = SUPER ALT, L, resizeactive,  100   0
binde = SUPER ALT, K, resizeactive,   0 -100
binde = SUPER ALT, J, resizeactive,   0  100

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = SUPER, S, togglespecialworkspace, magic
# bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay,  exec, playerctl play-pause
bindl = , XF86AudioPrev,  exec, playerctl previous
bindl = , XF86AudioNext,  exec, playerctl next

# Screenshots
bind = SUPER SHIFT, S, exec, hyprshot -m region --clipboard-only
bind = SHIFT, PRINT, exec, hyprshot -m window --clipboard-only
bind = CTRL, PRINT, exec, hyprshot -m output --clipboard-only
bind = , PRINT, exec, hyprshot -m region --clipboard-only

# Color picker
bind = SUPER CTRL, C, exec, hyprpicker -a

# Zoom
bind = SUPER, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
bind = SUPER, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {new = $2 * 0.9; if (new < 1) new = 1; print new}')

binde = SUPER, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = SUPER, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {new = $2 * 0.9; if (new < 1) new = 1; print new}')
binde = SUPER, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
binde = SUPER, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {new = $2 * 0.9; if (new < 1) new = 1; print new}')

bind = SUPER SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = SUPER SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = SUPER SHIFT, minus, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = SUPER SHIFT, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor 1
bind = SUPER SHIFT, 0, exec, hyprctl -q keyword cursor:zoom_factor 1

# Hyprsunset binds
binde = SUPER, F2, exec, hyprctl hyprsunset gamma -10
binde = SUPER, F3, exec, hyprctl hyprsunset gamma +10

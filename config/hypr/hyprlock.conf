source = $HOME/.config/hypr/themes/frappe.conf

$accent = $blue
$accentAlpha = $blueAlpha
$font = Overpass Nerd Font Propo

# GENERAL
general {
	grace = 1
	hide_cursor = true
}

# BACKGROUND
background {
	monitor =
	path = screenshot

	blur_passes = 3
	noise = 0.0117
	contrast = 1.3000 # Vibrant!!!
	brightness = 0.8000
	vibrancy = 0.2100
	vibrancy_darkness = 0.4

	color = $base
}

# LAYOUT
label {
  monitor =
  text =  $LAYOUT
  color = $text
  font_size = 12
  font_family = $font
  position = -10, -10
  halign = right
  valign = top
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = 0, 150
  halign = center
  valign = center
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = 0, 50
  halign = center
  valign = center
}

# FINGERPRINT
{
  monitor = "";
  text = "$FPRINTPROMPT";
  color = "$text";
  font_size = 14;
  font_family = $font;
  position = "0, 100";
  halign = "center";
  valign = "bottom";
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $surface0
  font_color = $text
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -150
  halign = center
  valign = center
}
